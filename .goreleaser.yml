version: 2

project_name: spwn

before:
  hooks:
    # Populate the embedded catalog mirror at
    # packages/dependency/internal/adapters/spwn/content/ by running
    # the `go:generate` directive in loader.go. The content/ tree is
    # a mirror of /catalog/ at the repo root (embedded via
    # `//go:embed all:content`); it's gitignored and regenerated on
    # demand. `make build` wires this as a prerequisite; goreleaser
    # must do it too, else the embed fails with
    # "pattern all:content: no matching files found".
    - sh -c "cd packages/dependency && go generate ./..."
    # Historical footguns we DON'T want back:
    #   - `go mod tidy` here was removed because it doesn't honour
    #     go.work and tries to fetch intra-repo `spwn.sh/packages/*`
    #     imports as remote modules (404 at spwn.sh). Build relies on
    #     go.work, which kicks in automatically at `go build` time.
    #   - A pre-release `go test -run TestBundling_...` gate that
    #     pointed at a test name that no longer exists (test got
    #     renamed); `go test` with no matching name exits 0, so the
    #     hook silently guarded nothing. The real bundling probe
    #     lives at tests/catalog/dependencies_test.go and runs in
    #     Validate CI — that's the gate on tagging.

builds:
  - id: spwn
    dir: apps/cli
    main: ./cmd/spwn
    binary: spwn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X spwn.sh/apps/cli.Version={{.Version}}
    # No post-build hook. The previous one ran `{{ .Path }} example
    # list` on the host-native binary to catch a hollow embed, but
    # `spwn example` was retired; the check became "unknown command
    # for spwn" and failed every release. Embed health is guarded by
    # Validate CI's catalog tests (tests/catalog/dependencies_test.go)
    # before the tag is ever pushed.

archives:
  - id: spwn
    builds:
      - spwn
    name_template: "spwn_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jterrazz
    name: spwn
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
