version: 2

project_name: spwn

before:
  hooks:
    # `go mod tidy` does NOT honor go.work — it tries to resolve
    # every intra-monorepo `spwn.sh/packages/*` import as a remote
    # module and fails with a 404 at spwn.sh. `make build` works
    # because workspace resolution kicks in at build time. Keep
    # the release path identical: rely on go.work, skip tidying.
    # Bundling gate: if the embed is broken (missing template dirs,
    # stale go:embed directive, shippedSlugs drift, etc.) we fail the
    # release here rather than shipping a hollow binary like v28.x.
    - sh -c "cd apps/cli && go test -run TestBundling_CompiledBinaryShipsExamples -v ."

builds:
  - id: spwn
    dir: apps/cli
    main: ./cmd/spwn
    binary: spwn
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w -X spwn.sh/apps/cli.Version={{.Version}}
    hooks:
      # Post-build bundling gate: run the freshly-compiled binary
      # targeting the host OS/arch only. `example list` returns a
      # non-zero exit code when the embed is empty, so an exit
      # status check is enough to catch a hollow binary. Skips
      # cross-compiled builds since we can't execute them here.
      post:
        - cmd: sh -c 'if [ "{{ .Os }}" = "$(go env GOOS)" ] && [ "{{ .Arch }}" = "$(go env GOARCH)" ]; then "{{ .Path }}" example list > /dev/null; fi'

archives:
  - id: spwn
    builds:
      - spwn
    name_template: "spwn_{{ .Os }}_{{ .Arch }}"
    format: tar.gz
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^chore:"

release:
  github:
    owner: jterrazz
    name: spwn
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"
