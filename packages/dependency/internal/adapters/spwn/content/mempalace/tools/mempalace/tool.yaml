name: "spwn:mempalace"
kind: tool
version: "0.1.0"
description: "Local memory palace exposed through an MCP server"

dependencies:
  - "spwn:python"

install:
  commands:
    - pip install --no-cache-dir --break-system-packages mempalace

verify:
  - command -v mempalace
  - mempalace --version

# Runtime-scoped config injection. The spawn-time merge pass converts
# the YAML value to JSON and shallow-merges into the target runtime's
# settings file (~/.claude/settings.json for Claude Code). Dependencies
# that declare runtimes outside this list won't receive any snippet.
runtime-config:
  runtimes:
    - "spwn:claude-code"
  configs:
    "spwn:claude-code":
      mcpServers:
        mempalace:
          command: python3
          args:
            - "-m"
            - "mempalace.mcp_server"
