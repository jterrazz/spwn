name: Default
description: Built-in three-tier organization
roles:
  - name: chief
    level: 0
    can_command:
      - manager
      - worker
    max_per_world: 1
    permissions:
      - delegate
      - review
      - orchestrate
  - name: manager
    level: 1
    can_command:
      - worker
    reports_to: chief
    permissions:
      - delegate
      - review
      - execute
  - name: worker
    level: 2
    reports_to: manager
    permissions:
      - execute
      - report
