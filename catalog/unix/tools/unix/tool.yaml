name: "spwn:unix"
version: "24.04"
description: "Core Unix utilities (bash, coreutils, grep, sed, awk, curl, jq)"

install:
  packages:
    - bash
    - coreutils
    - findutils
    - grep
    - sed
    - gawk
    - curl
    - wget
    - jq

verify:
  - command -v bash
  - command -v grep
  - command -v sed
  - command -v awk
  - command -v curl
  - command -v jq
