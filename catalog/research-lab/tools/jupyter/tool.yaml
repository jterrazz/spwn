name: "spwn:jupyter"
description: Interactive notebook environment for data exploration, visualization, and reproducible analysis.

dependencies:
  - "spwn:python"

install:
  commands:
    # Ubuntu 24.04 enforces PEP 668 (externally-managed-environment),
    # so bare `pip install` errors out. The container is a sealed
    # spwn-managed environment with no other Python tooling — safe
    # to opt out via --break-system-packages.
    - pip install --break-system-packages jupyter

verify:
  - jupyter --version
