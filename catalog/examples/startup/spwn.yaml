version: 2
name: startup

# Project-wide dependencies.
# Every agent in this project inherits these automatically.
# Agents should NOT repeat them in their own agent.yaml.
deps:
  - "@spwn/unix"
  - "@spwn/git"
  - "@spwn/node"

# Worlds define the runtime environments where agents operate.
# Each world lists which agents are placed inside it and which
# directories are mounted as workspaces.
worlds:
  startup:
    agents:
      - ceo
      - devops
      - analyst
    workspaces:
      - .
