name: "spwn:architect"
version: "1.1.0"
description: "The always-on orchestration daemon"

dependencies:
  - "spwn:cli"
  - "spwn:claude-code"
  - "spwn:docker-cli"

files:
  /usr/local/bin/architect-entrypoint.sh: tools/files/entrypoint.sh

install:
  commands:
    - chmod +x /usr/local/bin/architect-entrypoint.sh

verify:
  - command -v spwn
  - command -v claude
  - command -v docker
