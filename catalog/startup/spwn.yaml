version: 2
name: startup
title: Startup
tagline: One world, one team, three agents
description: |
  A tiny startup with a CEO, a devops engineer, and a research analyst
  all working together in a single world. The CEO decides what ships,
  devops keeps the pipeline green, and the analyst explores new ideas.

# Project-wide dependencies.
# Every agent in this project inherits these automatically.
# Agents should NOT repeat them in their own agent.yaml.
dependencies:
  - "@spwn/unix"
  - "@spwn/git"
  - "@spwn/node"

# Worlds define the runtime environments where agents operate.
# Each world lists which agents are placed inside it and which
# directories are mounted as workspaces.
worlds:
  startup:
    agents:
      - ceo
      - devops
      - analyst
    workspaces:
      - .
