name: ceo
description: The CEO — sets direction for the colony, approves what the analyst plans, and unblocks devops when shipping stalls.
role: chief

runtime:
  backend: "spwn:claude-code"

# No agent-specific deps — the CEO only needs the project-wide
# tools (unix, git, node) inherited from spwn.yaml.

# Local skills live in spwn/skills/<name>.md at the project root.
# They are injected into the agent's context at boot time.
skills:
  - sprint-planning

# Local hooks live in spwn/hooks/<name>.sh at the project root.
hooks:
  - pre-spawn
