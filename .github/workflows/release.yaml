name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # spwn ships two distinct artifacts on every release:
  #
  #   1. The CLI binary — built and uploaded by goreleaser into the
  #      same GitHub Release this job creates. Stays inline because
  #      goreleaser is materially better than the central
  #      release-go.yaml's raw `go build` flow for our cross-compile
  #      matrix + checksums + archive needs.
  #
  #   2. The Tauri desktop app — built, code-signed and notarized
  #      by the centralized jterrazz/jterrazz-workflows reusable
  #      workflow. The desktop bundle ships the spwn CLI as a Tauri
  #      sidecar, so the desktop job runs Go itself and re-builds
  #      the CLI in-place via the pre-build-script input. The
  #      goreleaser job above doesn't help here because tauri-action
  #      needs the binary on disk, not in a release asset.
  #
  #   3. The updater manifest (latest.json) — generated AFTER the
  #      desktop builds upload their .tar.gz artifacts. We sign each
  #      artifact with the Tauri updater key and compose the JSON
  #      that the desktop app checks on startup.

  cli:
    name: CLI release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop:
    name: Desktop release
    needs: cli
    uses: jterrazz/jterrazz-workflows/.github/workflows/release-tauri.yaml@main
    with:
      project-path: apps/observatory
      go-version: "1.25"
      pre-build-script: |
        # Build the CLI sidecar that the Tauri app will spawn at runtime.
        cd apps/cli && go build -o ../../bin/spwn ./cmd/spwn
        cd ../..
        # Bundling gate: the binary that's about to be embedded into
        # the desktop bundle MUST ship the example templates. We run
        # the same --json contract the observatory UI depends on.
        ./bin/spwn example list --json > /dev/null
      release-name: "spwn ${{ github.ref_name }}"
      release-body: "CLI + desktop app for managing AI agent worlds"
    secrets: inherit

  updater:
    name: Updater manifest
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (for cargo-tauri signer)
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Download release artifacts and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          WORKDIR=$(mktemp -d)

          # Write the private key to a temp file for signing
          echo "${TAURI_SIGNING_PRIVATE_KEY}" > "${WORKDIR}/key.pem"

          sign_asset() {
            local platform="$1" asset="$2"
            local url="${BASE_URL}/${asset}"

            echo "Processing ${platform} → ${asset}"

            # Download
            if ! gh release download "${TAG}" --pattern "${asset}" --dir "${WORKDIR}" 2>/dev/null; then
              echo "  Skipping ${platform}: ${asset} not found in release"
              return 1
            fi

            # Sign
            cargo tauri signer sign \
              --private-key "${WORKDIR}/key.pem" \
              --password "${TAURI_SIGNING_PRIVATE_KEY_PASSWORD}" \
              "${WORKDIR}/${asset}" 2>&1 || true

            # Read signature
            local sig=""
            if [ -f "${WORKDIR}/${asset}.sig" ]; then
              sig=$(cat "${WORKDIR}/${asset}.sig")
            fi

            if [ -z "$sig" ]; then
              echo "  Warning: no signature for ${platform}"
              return 1
            fi

            echo "  Signed ${platform} ✓"
            # Output the JSON fragment
            echo "ENTRY:\"${platform}\": { \"signature\": \"${sig}\", \"url\": \"${url}\" }"
          }

          # Sign each platform's updater asset
          ENTRIES=""
          add_entry() {
            local entry="$1"
            if [ -n "$ENTRIES" ]; then
              ENTRIES="${ENTRIES}, ${entry}"
            else
              ENTRIES="${entry}"
            fi
          }

          # macOS arm64
          result=$(sign_asset "darwin-aarch64" "spwn_aarch64.app.tar.gz" 2>&1) && \
            add_entry "$(echo "$result" | grep '^ENTRY:' | sed 's/^ENTRY://')" || true
          echo "$result" | grep -v '^ENTRY:'

          # macOS x86_64
          result=$(sign_asset "darwin-x86_64" "spwn_x64.app.tar.gz" 2>&1) && \
            add_entry "$(echo "$result" | grep '^ENTRY:' | sed 's/^ENTRY://')" || true
          echo "$result" | grep -v '^ENTRY:'

          # Linux x86_64 — Tauri uploads AppImage.tar.gz for updater
          result=$(sign_asset "linux-x86_64" "spwn_${VERSION}_amd64.AppImage.tar.gz" 2>&1) && \
            add_entry "$(echo "$result" | grep '^ENTRY:' | sed 's/^ENTRY://')" || true
          echo "$result" | grep -v '^ENTRY:'

          rm -f "${WORKDIR}/key.pem"

          if [ -z "$ENTRIES" ]; then
            echo "Error: no platforms were signed — latest.json not generated"
            # Don't fail the release — the desktop builds already shipped.
            # The updater just won't work for this release.
            exit 0
          fi

          # Compose latest.json
          cat > "${WORKDIR}/latest.json" <<EOF
          {
            "version": "${VERSION}",
            "notes": "spwn ${TAG}",
            "pub_date": "$(date -u +%Y-%m-%dT%H:%M:%SZ)",
            "platforms": { ${ENTRIES} }
          }
          EOF

          # Pretty-print and validate
          python3 -m json.tool "${WORKDIR}/latest.json"

          # Upload to the release
          gh release upload "${TAG}" "${WORKDIR}/latest.json" --clobber
          echo ""
          echo "latest.json uploaded to ${TAG} ✓"
