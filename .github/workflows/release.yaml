name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  # spwn ships two distinct artifacts on every release:
  #
  #   1. The CLI binary — built and uploaded by goreleaser into the
  #      same GitHub Release this job creates. Stays inline because
  #      goreleaser is materially better than the central
  #      release-go.yaml's raw `go build` flow for our cross-compile
  #      matrix + checksums + archive needs.
  #
  #   2. The Tauri desktop app — built, code-signed and notarized
  #      by the centralized jterrazz/jterrazz-workflows reusable
  #      workflow. The desktop bundle ships the spwn CLI as a Tauri
  #      sidecar, so the desktop job runs Go itself and re-builds
  #      the CLI in-place via the pre-build-script input. The
  #      goreleaser job above doesn't help here because tauri-action
  #      needs the binary on disk, not in a release asset.
  #
  #   3. The updater manifest (latest.json) — generated AFTER the
  #      desktop builds upload their .tar.gz artifacts. We sign each
  #      artifact with the Tauri updater key and compose the JSON
  #      that the desktop app checks on startup.

  cli:
    name: CLI release
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum

      - name: Run GoReleaser
        uses: goreleaser/goreleaser-action@v6
        with:
          version: '~> v2'
          args: release --clean
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  desktop:
    name: Desktop release
    needs: cli
    uses: jterrazz/jterrazz-workflows/.github/workflows/release-tauri.yaml@main
    with:
      project-path: apps/observatory
      go-version: "1.25"
      pre-build-script: |
        # Build the CLI sidecar that the Tauri app will spawn at runtime.
        cd apps/cli && go build -o ../../bin/spwn ./cmd/spwn
        cd ../..
        # Bundling gate: the binary that's about to be embedded into
        # the desktop bundle MUST ship the example templates. We run
        # the same --json contract the observatory UI depends on.
        ./bin/spwn example list --json > /dev/null
      release-name: "spwn ${{ github.ref_name }}"
      release-body: "CLI + desktop app for managing AI agent worlds"
    secrets: inherit

  updater:
    name: Updater manifest
    needs: desktop
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust (for cargo-tauri signer)
        uses: dtolnay/rust-toolchain@stable

      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked

      - name: Download release artifacts and generate latest.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}
        run: |
          set -euo pipefail
          TAG="${{ github.ref_name }}"
          VERSION="${TAG#v}"
          REPO="${{ github.repository }}"
          BASE_URL="https://github.com/${REPO}/releases/download/${TAG}"
          WORKDIR=$(mktemp -d)

          sign_and_add() {
            local platform="$1" asset="$2"
            local url="${BASE_URL}/${asset}"

            echo "Processing ${platform} → ${asset}"

            if ! gh release download "${TAG}" --pattern "${asset}" --dir "${WORKDIR}" 2>/dev/null; then
              echo "  Skipping ${platform}: ${asset} not found"
              return 1
            fi

            # Sign using env var directly (avoids file encoding issues)
            cargo tauri signer sign \
              --private-key "$TAURI_SIGNING_PRIVATE_KEY" \
              --password "$TAURI_SIGNING_PRIVATE_KEY_PASSWORD" \
              "${WORKDIR}/${asset}" 2>&1 || true

            local sig=""
            if [ -f "${WORKDIR}/${asset}.sig" ]; then
              sig=$(cat "${WORKDIR}/${asset}.sig")
            fi

            if [ -z "$sig" ]; then
              echo "  Warning: no signature for ${platform}"
              return 1
            fi

            echo "  Signed ${platform} ✓"
            # Append to entries file (avoids subshell variable scoping)
            printf '"%s": { "signature": "%s", "url": "%s" }\n' \
              "$platform" "$sig" "$url" >> "${WORKDIR}/entries.txt"
          }

          touch "${WORKDIR}/entries.txt"

          # macOS arm64 + x86_64
          sign_and_add "darwin-aarch64" "spwn_aarch64.app.tar.gz" || true
          sign_and_add "darwin-x86_64" "spwn_x64.app.tar.gz" || true

          # Linux — Tauri uploads AppImage directly (no .tar.gz wrapper)
          sign_and_add "linux-x86_64" "spwn_${VERSION}_amd64.AppImage" || true

          if [ ! -s "${WORKDIR}/entries.txt" ]; then
            echo "Warning: no platforms were signed — latest.json not generated"
            exit 0
          fi

          # Join entries with commas
          ENTRIES=$(paste -sd ',' "${WORKDIR}/entries.txt" | sed 's/,/, /g')

          # Compose latest.json
          PUB_DATE=$(date -u +%Y-%m-%dT%H:%M:%SZ)
          python3 -c "
          import json, sys
          entries_raw = '''${ENTRIES}'''
          platforms = {}
          for entry in entries_raw.split('\n'):
            entry = entry.strip()
            if not entry: continue
            obj = json.loads('{' + entry + '}')
            platforms.update(obj)
          manifest = {
            'version': '${VERSION}',
            'notes': 'spwn ${TAG}',
            'pub_date': '${PUB_DATE}',
            'platforms': platforms
          }
          json.dump(manifest, open('${WORKDIR}/latest.json', 'w'), indent=2)
          json.dump(manifest, sys.stdout, indent=2)
          print()
          "

          # Upload
          gh release upload "${TAG}" "${WORKDIR}/latest.json" --clobber
          echo "latest.json uploaded to ${TAG} ✓"
