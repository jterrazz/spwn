name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum
      - name: Vet all modules
        run: |
          cd packages/foundation && go vet ./...
          cd ../imagebuilder && go vet ./...
          cd ../agent && go vet ./...
          cd ../migration && go vet ./...
          cd ../world && go vet ./...
          cd ../messenger && go vet ./...
          cd ../../examples && go vet ./...
          cd ../apps/cli && go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum
      - name: Unit tests
        run: |
          cd packages/foundation && go test ./...
          cd ../imagebuilder && go test ./...
          cd ../agent && go test ./...
          cd ../migration && go test ./...
          cd ../world && go test ./...
          cd ../messenger && go test ./...
          cd ../../examples && go test ./...
          cd ../apps/cli && go test ./...

      - name: Examples bundled in compiled binary
        # TestBundling_CompiledBinaryShipsExamples already runs above as
        # part of the apps/cli suite; surfacing it as its own step makes
        # the intent — "a release binary WILL ship the examples" — an
        # explicit CI gate rather than a buried invariant.
        run: cd apps/cli && go test -run TestBundling_CompiledBinaryShipsExamples -v .

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum
      - name: Build binary
        run: cd apps/cli && go build -o ../../bin/spwn ./cmd/spwn

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint web
        run: pnpm -C apps/web lint
      - name: Build web
        run: pnpm -C apps/web build
