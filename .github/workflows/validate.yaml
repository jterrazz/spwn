name: Validate

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum
      - name: Vet all modules
        run: |
          cd packages/base && go vet ./...
          cd ../image && go vet ./...
          cd ../mind && go vet ./...
          cd ../mailbox && go vet ./...
          cd ../manifest && go vet ./...
          cd ../migration && go vet ./...
          cd ../world && go vet ./...
          cd ../../catalog/templates && go vet ./...
          cd ../tools && go vet ./...
          cd ../runtimes && go vet ./...
          cd ../../apps/cli && go vet ./...

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum
      - name: Unit tests
        run: |
          cd packages/base && go test ./...
          cd ../image && go test ./...
          cd ../mind && go test ./...
          cd ../mailbox && go test ./...
          cd ../manifest && go test ./...
          cd ../migration && go test ./...
          cd ../world && go test ./...
          cd ../../catalog/templates && go test ./...
          cd ../tools && go test ./...
          cd ../runtimes && go test ./...
          cd ../../apps/cli && go test ./...

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'
          cache-dependency-path: apps/cli/go.sum
      - name: Build binary
        run: cd apps/cli && go build -o ../../bin/spwn ./cmd/spwn

  web:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 9
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
      - name: Install dependencies
        run: pnpm install --frozen-lockfile
      - name: Lint web
        run: pnpm -C apps/web lint
      - name: Build web
        run: pnpm -C apps/web build
