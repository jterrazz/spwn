name: Open Proposal
description: An idea, question, or suggestion that doesn't fit the other categories. Go wild.
labels: ["open"]
body:
  - type: markdown
    attributes:
      value: |
        For anything that doesn't fit a feature request or bug report - design ideas, architecture questions, wild experiments, "what if" scenarios, or things you noticed that feel off but you can't quite pin down.

  - type: textarea
    id: description
    attributes:
      label: What's on your mind?
      description: Describe your idea, observation, or question. No format required.
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Screenshots, links, related issues, or anything else.
    validations:
      required: false
