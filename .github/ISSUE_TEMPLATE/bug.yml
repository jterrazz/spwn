name: Bug Report
description: Something is broken. Include precise steps, errors, and relevant code paths.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: What happened
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: reproduce
    attributes:
      label: Steps to reproduce
      description: Minimal steps to trigger the issue.
      placeholder: |
        1. Run `spwn up -w .`
        2. Run `spwn agent talk neo`
        3. Observe error in terminal
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
      description: What should have happened instead.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / error output
      description: Paste relevant error messages or logs.
      render: shell
    validations:
      required: false

  - type: input
    id: version
    attributes:
      label: spwn version
      description: Output of `spwn --version`
      placeholder: "v0.8.2"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: OS / Architecture
      placeholder: "macOS 15.4 arm64 / Ubuntu 24.04 amd64"
    validations:
      required: true

  - type: textarea
    id: code
    attributes:
      label: Relevant code or config
      description: If you identified the issue, point to specific files, lines, or config.
      render: yaml
    validations:
      required: false
