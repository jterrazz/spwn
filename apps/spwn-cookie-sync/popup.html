<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <style>
      body {
        font-family: -apple-system, system-ui, sans-serif;
        width: 320px;
        padding: 12px;
        margin: 0;
        font-size: 13px;
      }
      h1 { font-size: 13px; margin: 0 0 4px; font-weight: 600; }
      .gate-status { font-size: 11px; color: #888; margin-bottom: 10px; }
      .gate-ok { color: #2a7; }
      .gate-bad { color: #c33; }
      hr { border: 0; border-top: 1px solid #eee; margin: 8px 0; }
      .provider {
        display: flex;
        align-items: center;
        gap: 8px;
        padding: 6px 0;
        border-bottom: 1px solid #f4f4f4;
      }
      .provider:last-child { border-bottom: 0; }
      .glyph { font-size: 16px; line-height: 1; flex: 0 0 16px; text-align: center; }
      .glyph-on { color: #2a7; }
      .glyph-off { color: #bbb; }
      .name { font-weight: 600; flex: 1; }
      .tag {
        font-size: 10px;
        font-weight: 600;
        padding: 2px 6px;
        border-radius: 3px;
        text-transform: uppercase;
        letter-spacing: 0.5px;
      }
      .tag-connected { background: #e8f7ed; color: #2a7; }
      .tag-pending { background: #f2f2f2; color: #888; }
      .meta { width: 100%; font-size: 10px; color: #888; padding-left: 24px; margin-top: -4px; }
      .empty { font-size: 12px; color: #888; padding: 12px 0; text-align: center; }
    </style>
  </head>
  <body>
    <h1>spwn cookie sync</h1>
    <div id="gate-status" class="gate-status">checking gate…</div>

    <hr />

    <div id="providers" class="empty">loading…</div>

    <hr />

    <div class="gate-status">
      gate at 127.0.0.1:9000 — visit a listed site to sync its cookies
    </div>

    <script src="popup.js"></script>
  </body>
</html>
