# Overlay: docker-pilot base + a colony roster (worlds.neo carries the
# [morpheus, neo] roster), layered after $FIXTURES/docker-pilot/ alongside
# the morpheus agent tree.
version: 1
name: docker-pilot

dependencies:
  - "spwn:unix"
  - "spwn:git"

worlds:
  neo:
    agents: [morpheus, neo]
    workspaces: [.]
