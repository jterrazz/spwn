# Fixture: two worlds, asymmetric knowledge configuration.
#
# `primary` declares a knowledge base; `ephemeral` explicitly opts
# out. Exercises the validator's per-world knowledge logic and the
# info-level hint that surfaces for worlds with no knowledge path —
# the signal that tells the user they're running a "dry" world.
version: 1
name: knowledge-mixed-worlds

worlds:
  primary:
    agents: [neo]
    workspaces: [.]
    knowledge: ./knowledge
  ephemeral:
    agents: [trinity]
    workspaces: [.]
