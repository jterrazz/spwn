# Two hooks: one SessionStart (no matcher), one PreToolUse scoped to
# Bash (with matcher). Exercises both shapes of the translation.
hooks:
  - name: session-marker
    event: SessionStart
    command: echo "session-start=$(date -u +%FT%TZ)" > /tmp/hook-pilot-session.log

  - name: bash-audit
    event: PreToolUse
    matcher: Bash
    command: echo "bash $(date -u +%FT%TZ)" >> /tmp/hook-pilot-bash.log
