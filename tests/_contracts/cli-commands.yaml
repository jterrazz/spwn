    - command: spwn agent talk
      tests: [tests/cli/agent/talk/talk.e2e.test.ts]
    - command: spwn world list
      tests: [tests/cli/world/list/world-list.e2e.test.ts]
    - command: spwn skill
      tests: [tests/cli/skill/skill/skills.e2e.test.ts]
    - command: spwn install
      tests: [tests/cli/dependency/install.e2e.test.ts]
    - command: spwn auth
      tests: [tests/cli/auth/auth/auth.e2e.test.ts]
