      tests: [tests/specs/cli/world/up-down.test.ts]
    - command: spwn down
      tests: [tests/specs/cli/world/up-down.test.ts]
    - command: spwn agent talk
      tests: [tests/specs/cli/agent/talk.test.ts]
    - command: spwn world list
      tests: [tests/specs/cli/world/world-list.test.ts]
    - command: spwn skill
      tests: [tests/specs/cli/skill/skills.test.ts]
    - command: spwn install
      tests: [tests/specs/cli/dependency/install.test.ts]
    - command: spwn auth
      tests: [tests/specs/cli/auth/auth.test.ts]
