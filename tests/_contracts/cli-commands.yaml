      tests: [tests/specs/cli/init/init.test.ts]
    - command: spwn check
      tests: [tests/specs/cli/check/check.test.ts]
    - command: spwn build
      tests:
          [tests/specs/cli/build/build.test.ts, tests/specs/cli/build/tree-only.test.ts]
